<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Converter Maiúsculas e Minúsculas</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0f19;
      --panel: #121826;
      --panel-2: #1a2235;
      --border: #2b3550;
      --text: #f3f6ff;
      --muted: #a7b1c7;
      --accent: #4f8cff;
      --accent-hover: #3b74dd;
      --output-bg: #0f1524;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1240px;
      margin: 28px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 32px;
      margin: 0 0 22px;
      font-weight: 700;
      line-height: 1.2;
    }

    .box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .content {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .panel {
      flex: 1;
      min-width: 340px;
    }

    label.title {
      display: block;
      font-size: 20px;
      color: var(--muted);
      margin-bottom: 14px;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      height: 340px;
      padding: 18px;
      font-size: 22px;
      line-height: 1.6;
      border: 1px solid var(--border);
      border-radius: 10px;
      resize: vertical;
      background: var(--panel-2);
      color: var(--text);
      outline: none;
    }

    textarea::placeholder {
      color: #7f8aa3;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.18);
    }

    #textoSaida {
      background: var(--output-bg);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      width: 62px;
      height: 62px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 34px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .options {
      margin-top: 16px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 18px;
      color: var(--text);
    }

    .options label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .options input[type="radio"] {
      transform: scale(1.2);
      cursor: pointer;
    }

    @media (max-width: 900px) {
      .content {
        flex-direction: column;
        align-items: stretch;
      }

      .actions {
        justify-content: stretch;
      }

      button {
        width: 100%;
        height: 56px;
        font-size: 28px;
      }

      h1 {
        font-size: 28px;
      }

      label.title {
        font-size: 18px;
      }

      textarea {
        font-size: 20px;
        height: 280px;
      }

      .options {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Converter Maiúsculas e Minúsculas</h1>

    <div class="box">
      <div class="content">
        <div class="panel">
          <label for="textoEntrada" class="title">Digite ou cole o texto no campo abaixo:</label>
          <textarea id="textoEntrada" placeholder="Digite seu texto aqui..."></textarea>

          <div class="options">
            <label>
              <input type="radio" name="tipoConversao" value="maiusculas">
              Maiúsculas
            </label>

            <label>
              <input type="radio" name="tipoConversao" value="minusculas" checked>
              Minúsculas
            </label>

            <label>
              <input type="radio" name="tipoConversao" value="primeiraLetra">
              Primeira letra
            </label>
          </div>
        </div>

        <div class="actions">
          <button id="btnConverter" title="Converter">›</button>
        </div>

        <div class="panel">
          <label for="textoSaida" class="title">Resultado:</label>
          <textarea id="textoSaida" readonly placeholder="O resultado aparecerá aqui..."></textarea>
        </div>
      </div>
    </div>
  </div>

  <script>
    const textoEntrada = document.getElementById("textoEntrada");
    const textoSaida = document.getElementById("textoSaida");
    const btnConverter = document.getElementById("btnConverter");
    const opcoesConversao = document.querySelectorAll('input[name="tipoConversao"]');

    function capitalizarPrimeiraLetraDeCadaLinha(texto) {
      return texto
        .split("\n")
        .map((linha) => {
          const linhaSemEspacosInicio = linha.trimStart();

          if (!linhaSemEspacosInicio) {
            return linha;
          }

          const indicePrimeiraLetra = linha.indexOf(linhaSemEspacosInicio[0]);

          return (
            linha.slice(0, indicePrimeiraLetra) +
            linhaSemEspacosInicio.charAt(0).toUpperCase() +
            linhaSemEspacosInicio.slice(1).toLowerCase()
          );
        })
        .join("\n");
    }

    function converterTexto() {
      const texto = textoEntrada.value;
      const tipoSelecionado = document.querySelector('input[name="tipoConversao"]:checked').value;

      let resultado = "";

      if (tipoSelecionado === "maiusculas") {
        resultado = texto.toUpperCase();
      } else if (tipoSelecionado === "minusculas") {
        resultado = texto.toLowerCase();
      } else if (tipoSelecionado === "primeiraLetra") {
        resultado = capitalizarPrimeiraLetraDeCadaLinha(texto);
      }

      textoSaida.value = resultado;
    }

    btnConverter.addEventListener("click", converterTexto);

    textoEntrada.addEventListener("input", converterTexto);

    textoEntrada.addEventListener("paste", () => {
      setTimeout(converterTexto, 0);
    });

    opcoesConversao.forEach((opcao) => {
      opcao.addEventListener("change", converterTexto);
    });
  </script>
</body>
</html>
